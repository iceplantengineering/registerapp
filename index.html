<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1520">
<title>レジ操作ガイド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --nav-h:52px;--nav-bot:calc(56px + env(safe-area-inset-bottom));
  --bg:#0a0f1a;--bg2:#141c2b;--card:rgba(20,30,50,0.7);--card2:rgba(25,35,55,0.8);
  --border:rgba(255,255,255,0.08);--text:#e8edf5;--text2:#8b99b0;--text3:#5a6a82;
  --amber:#f0a500;--amber2:#fbbf24;--blue:#3b82f6;--blue2:#60a5fa;
  --red:#ef4444;--red2:#f87171;--green:#10b981;--green2:#34d399;
  --purple:#a78bfa;--cyan:#22d3ee;
  --glass:rgba(255,255,255,0.04);--glass2:rgba(255,255,255,0.07);
  --header-bg:linear-gradient(135deg,#0a1628 0%,#162032 100%);
  --nav-bg:rgba(10,15,26,0.92);
  --glow:0 0 20px rgba(240,165,0,0.15);
}
[data-theme="light"]{
  --bg:#f0f4f8;--bg2:#e2e8f0;--card:rgba(255,255,255,0.85);--card2:rgba(248,250,252,0.9);
  --border:rgba(0,0,0,0.08);--text:#1e293b;--text2:#64748b;--text3:#94a3b8;
  --glass:rgba(0,0,0,0.02);--glass2:rgba(0,0,0,0.04);
  --header-bg:linear-gradient(135deg,#f8fafc 0%,#e2e8f0 100%);
  --nav-bg:rgba(248,250,252,0.92);--glow:0 0 20px rgba(240,165,0,0.1);
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);padding-bottom:var(--nav-bot);min-height:100vh;transition:background .3s,color .3s;}

.header{background:var(--header-bg);border-bottom:1px solid var(--border);padding:0 16px;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.header-left{display:flex;align-items:center;gap:10px;}
.header-logo{font-family:'JetBrains Mono',monospace;font-weight:900;font-size:15px;background:linear-gradient(135deg,var(--amber),var(--amber2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px;}
#head-title{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:55vw;}
.theme-toggle{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--glass2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .2s;}
.theme-toggle:active{transform:scale(.9);}
.theme-toggle .moon,.theme-toggle .sun{display:none;}
[data-theme="dark"] .theme-toggle .moon{display:inline;}
[data-theme="light"] .theme-toggle .sun{display:inline;}
:root:not([data-theme]) .theme-toggle .moon{display:inline;}

.view{display:none;padding:14px;padding-top:16px;}
.view.active{display:block;animation:fadeIn .25s ease-out;}

.search-wrap{position:relative;margin-bottom:14px;}
.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none;}
#search-input,#gsearch-input{width:100%;padding:12px 12px 12px 42px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:15px;font-family:'Noto Sans JP',sans-serif;outline:none;transition:border .2s,box-shadow .2s;-webkit-appearance:none;}
#search-input:focus,#gsearch-input:focus{border-color:rgba(240,165,0,.4);box-shadow:var(--glow);}

.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cat-card{background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:16px;padding:16px 14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;touch-action:manipulation;}
.cat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cat-color,var(--amber));border-radius:16px 16px 0 0;}
.cat-card:active{transform:scale(.96);background:var(--card2);}
.cat-icon{font-size:26px;line-height:1;margin-bottom:6px;}
.cat-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.4;}
.cat-sub{font-size:10px;color:var(--text3);margin-top:2px;}
.cat-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);margin-top:6px;}

.list-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.list-header-icon{font-size:22px;}
.list-header-title{font-size:16px;font-weight:700;flex:1;}
.list-header-count{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text3);background:var(--glass2);padding:4px 10px;border-radius:8px;}

.item-card{display:flex;align-items:center;gap:10px;padding:14px;background:var(--card);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:14px;margin-bottom:6px;cursor:pointer;transition:all .15s;touch-action:manipulation;}
.item-card:active{transform:scale(.98);background:var(--card2);}
.item-no{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;min-width:40px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--bg2);color:var(--text2);flex-shrink:0;}
.item-text{font-size:14px;font-weight:600;flex:1;line-height:1.4;}
.op-tags{display:flex;gap:4px;margin-left:auto;flex-shrink:0;}
.op-dot{width:8px;height:8px;border-radius:50%;}
.op-dot.R{background:var(--blue);}
.op-dot.J{background:var(--amber);}
.op-dot.P{background:var(--red);}
.item-arrow{color:var(--text3);font-size:10px;flex-shrink:0;}

.det-header{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.det-no{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--amber);margin-bottom:6px;letter-spacing:1.5px;}
.det-title{font-size:20px;font-weight:900;line-height:1.3;background:linear-gradient(135deg,var(--text),var(--text2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.steps-container{display:flex;flex-direction:column;gap:2px;margin-bottom:20px;}
.step-item{display:flex;gap:12px;padding:16px;background:var(--card);backdrop-filter:blur(8px);border:1px solid var(--border);position:relative;transition:background .2s;}
.step-item:first-child{border-radius:16px 16px 0 0;}
.step-item:last-child{border-radius:0 0 16px 16px;}
.step-item:only-child{border-radius:16px;}
.step-connector{position:absolute;left:36px;bottom:-2px;width:2px;height:4px;background:var(--border);z-index:1;}
.step-item:last-child .step-connector{display:none;}
.step-num{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--amber),var(--amber2));display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;color:#000;font-weight:700;flex-shrink:0;margin-top:1px;}
.step-body{flex:1;}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:4px 10px;border-radius:8px;margin-bottom:8px;letter-spacing:.5px;}
.b-R{background:rgba(59,130,246,.15);color:var(--blue2);border:1px solid rgba(59,130,246,.25);}
.b-J{background:rgba(240,165,0,.12);color:var(--amber2);border:1px solid rgba(240,165,0,.2);}
.b-P{background:rgba(239,68,68,.12);color:var(--red2);border:1px solid rgba(239,68,68,.2);}
.step-text{font-size:14px;line-height:1.8;color:var(--text);}

.note-box{background:rgba(240,165,0,.06);border:1px solid rgba(240,165,0,.2);border-radius:14px;padding:16px;margin-bottom:20px;}
.note-label{font-size:11px;font-weight:700;color:var(--amber);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.note-text{font-size:13px;line-height:1.8;color:var(--text2);}

.det-nav{display:flex;gap:8px;margin-top:20px;}
.det-nav-btn{flex:1;padding:14px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;font-family:'Noto Sans JP',sans-serif;touch-action:manipulation;min-height:50px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
.det-nav-btn:active{background:var(--card2);transform:scale(.97);}

.nav-bar{position:fixed;bottom:0;left:0;right:0;height:calc(56px + env(safe-area-inset-bottom));background:var(--nav-bg);border-top:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:10px;color:var(--text3);cursor:pointer;transition:color .15s;border:none;background:none;font-family:'Noto Sans JP',sans-serif;padding:8px 0;min-height:44px;}
.nav-btn.active{color:var(--amber);}
.nav-btn:active svg{transform:scale(.85);}

.section-hd{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;padding:18px 0 10px;}

.empty{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:12px;}

.swipe-hint{position:fixed;bottom:calc(66px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:11px;color:var(--text2);pointer-events:none;opacity:0;transition:opacity .3s;z-index:150;backdrop-filter:blur(8px);}
.swipe-hint.show{opacity:1;}

.hero-banner{background:linear-gradient(135deg,rgba(240,165,0,.1),rgba(59,130,246,.08));border:1px solid var(--border);border-radius:18px;padding:22px 18px;margin-bottom:16px;position:relative;overflow:hidden;}
.hero-banner::after{content:'';position:absolute;top:-50%;right:-30%;width:200px;height:200px;background:radial-gradient(circle,rgba(240,165,0,.08),transparent 70%);pointer-events:none;}
.hero-title{font-size:20px;font-weight:900;margin-bottom:4px;background:linear-gradient(135deg,var(--amber),var(--amber2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero-sub{font-size:12px;color:var(--text2);}
.hero-count{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--amber);margin-top:8px;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="header-logo">REG</div>
    <div id="head-title">レジ操作ガイド</div>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="テーマ切り替え">
    <span class="moon">🌙</span>
    <span class="sun">☀️</span>
  </button>
</div>

<div id="view-home" class="view active"></div>
<div id="view-list" class="view">
  <div class="list-header">
    <span class="list-header-icon" id="list-icon"></span>
    <span class="list-header-title" id="list-title"></span>
    <span class="list-header-count" id="list-count"></span>
  </div>
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="search-input" placeholder="No. またはキーワードで検索" enterkeyhint="search">
  </div>
  <div id="list-body"></div>
</div>
<div id="view-det" class="view"><div id="det-body"></div></div>

<div class="swipe-hint" id="swipe-hint">← スワイプで前/次へ →</div>

<nav class="nav-bar">
  <button class="nav-btn active" id="nav-home" onclick="renderHome()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>ホーム</span>
  </button>
  <button class="nav-btn" id="nav-search" onclick="showGlobalSearch()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <span>検索</span>
  </button>
  <button class="nav-btn" id="nav-back" onclick="goBack()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    <span>戻る</span>
  </button>
</nav>

<script>
function initTheme(){const s=localStorage.getItem('reg_theme');if(s)document.documentElement.setAttribute('data-theme',s);}
function toggleTheme(){const c=document.documentElement.getAttribute('data-theme');const n=c==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('reg_theme',n);}
</script>
<script src="app-data.js"></script>
<script src="app-logic.js"></script>
</body>
</html>
