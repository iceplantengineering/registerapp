<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1520">
<title>レジ研修ナビ 完全版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ─── CSS VARIABLES ─── */
:root {
  --nav-h: 56px;
  --nav-bot: env(safe-area-inset-bottom, 20px) + 56px;
}

/* Dark Theme (default) */
:root, [data-theme="dark"] {
  --bg: #0d1520;
  --bg2: #111d2e;
  --card: #162032;
  --card2: #1c2a40;
  --border: #253650;
  --text: #c8d8e8;
  --text2: #7a94b0;
  --text3: #4a6480;
  --amber: #f0a500;
  --amber2: #ffc340;
  --blue: #3b82f6;
  --blue2: #60a5fa;
  --red: #ef4444;
  --red2: #f87171;
  --green: #10b981;
  --green2: #34d399;
  --shadow: rgba(0,0,0,0.4);
  --header-bg: linear-gradient(135deg,#0a1628 0%,#162032 100%);
  --nav-bg: rgba(13,21,32,0.95);
}

/* Light Theme */
[data-theme="light"] {
  --bg: #f5f7fa;
  --bg2: #e8edf3;
  --card: #ffffff;
  --card2: #f8fafc;
  --border: #e2e8f0;
  --text: #1e293b;
  --text2: #64748b;
  --text3: #94a3b8;
  --amber: #f59e0b;
  --amber2: #fbbf24;
  --blue: #3b82f6;
  --blue2: #2563eb;
  --red: #ef4444;
  --red2: #dc2626;
  --green: #10b981;
  --green2: #059669;
  --shadow: rgba(0,0,0,0.08);
  --header-bg: linear-gradient(135deg,#ffffff 0%,#f8fafc 100%);
  --nav-bg: rgba(255,255,255,0.95);
}

/* Auto (system preference) */
@media (prefers-color-scheme: light) {
  :root:not([data-theme="dark"]):not([data-theme="light"]) {
    --bg: #f5f7fa;
    --bg2: #e8edf3;
    --card: #ffffff;
    --card2: #f8fafc;
    --border: #e2e8f0;
    --text: #1e293b;
    --text2: #64748b;
    --text3: #94a3b8;
    --header-bg: linear-gradient(135deg,#ffffff 0%,#f8fafc 100%);
    --nav-bg: rgba(255,255,255,0.95);
    --shadow: rgba(0,0,0,0.08);
  }
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--bg);
  color:var(--text);
  padding-bottom:var(--nav-bot);
  min-height:100vh;
  transition:background .3s,color .3s;
}

/* ─── HEADER ─── */
.header{
  background:var(--header-bg);
  border-bottom:1px solid var(--border);
  padding:0 12px;
  height:var(--nav-h);
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:200;
  box-shadow:0 2px 10px var(--shadow);
  transition:background .3s,border .3s;
}
.header-left{display:flex;align-items:center;gap:8px;}
.header-logo{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--amber);
  letter-spacing:1px;
  opacity:.8;
}
#head-title{
  font-size:14px;
  font-weight:700;
  color:var(--text);
}
.progress-pill{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  background:var(--card2);
  border:1px solid var(--border);
  padding:4px 8px;
  border-radius:16px;
  color:var(--amber);
  white-space:nowrap;
}

/* Theme Toggle Button */
.theme-toggle{
  width:36px;
  height:36px;
  border-radius:50%;
  border:none;
  background:var(--card2);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  transition:all .2s;
}
.theme-toggle:active{transform:scale(.9);}
.theme-toggle span{display:none;}
[data-theme="dark"] .theme-toggle .moon{display:inline;}
[data-theme="light"] .theme-toggle .sun{display:inline;}
:root:not([data-theme="dark"]):not([data-theme="light"]) .theme-toggle .auto{display:inline;}

/* ─── VIEWS ─── */
.view{display:none;padding:12px;padding-top:16px;}
.view.active{display:block;}

/* ─── SEARCH ─── */
.search-wrap{position:relative;margin-bottom:12px;}
.search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none;}
#search-input{
  width:100%;
  padding:14px 14px 14px 44px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  color:var(--text);
  font-size:16px;
  font-family:'Noto Sans JP',sans-serif;
  outline:none;
  transition:border .2s,box-shadow .2s;
}
#search-input:focus{
  border-color:var(--amber);
  box-shadow:0 0 0 3px rgba(240,165,0,.2);
}
#search-input::placeholder{color:var(--text3);}

/* ─── CATEGORY CARDS ─── */
.cat-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
@media(max-width:360px){
  .cat-grid{grid-template-columns:1fr;}
}
.cat-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px 14px;
  cursor:pointer;
  transition:all .15s;
  display:flex;
  flex-direction:column;
  gap:8px;
  position:relative;
  overflow:hidden;
  touch-action:manipulation;
}
.cat-card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:3px;
  background:var(--cat-color,var(--amber));
  border-radius:16px 16px 0 0;
}
.cat-card:active{transform:scale(.97);background:var(--card2);}
.cat-icon{font-size:24px;line-height:1;}
.cat-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.3;}
.cat-sub{font-size:10px;color:var(--text3);}
.cat-meta{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
.cat-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);}
.cat-prog-bar{height:4px;background:var(--bg2);border-radius:2px;margin-top:6px;}
.cat-prog-fill{height:100%;border-radius:2px;background:var(--cat-color,var(--amber));transition:width .3s;}

/* ─── LIST ─── */
.list-header{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:12px;
  padding-bottom:12px;
  border-bottom:1px solid var(--border);
}
.list-header-icon{font-size:20px;}
.list-header-title{font-size:15px;font-weight:700;}
.list-header-count{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);}

.item-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  margin-bottom:8px;
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px 12px;
  cursor:pointer;
  transition:all .15s;
  position:relative;
  touch-action:manipulation;
}
.item-card:active{transform:scale(.98);background:var(--card2);}
.item-done{opacity:.4;}
.item-done .item-text{text-decoration:line-through;}
.item-no{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  font-weight:700;
  min-width:38px;
  height:26px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg2);
  color:var(--text2);
  border:1px solid var(--border);
  flex-shrink:0;
}
.item-text{font-size:14px;flex:1;line-height:1.4;}
.item-chk{
  width:24px;
  height:24px;
  border-radius:50%;
  border:2px solid var(--border);
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .2s;
}
.item-chk.done{background:var(--green);border-color:var(--green);}
.item-chk.done::after{content:'✓';font-size:12px;color:#fff;font-weight:700;}
.item-arrow{color:var(--text3);font-size:12px;flex-shrink:0;}

/* ─── DETAIL ─── */
.det-header{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.det-no{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--amber);margin-bottom:6px;letter-spacing:1px;}
.det-title{font-size:20px;font-weight:700;line-height:1.3;}

.steps-container{
  display:flex;
  flex-direction:column;
  gap:2px;
  margin-bottom:20px;
}
.step-item{
  display:flex;
  gap:12px;
  padding:14px;
  background:var(--card);
  border:1px solid var(--border);
  position:relative;
  transition:background .2s;
}
.step-item:active{background:var(--card2);}
.step-item:first-child{border-radius:14px 14px 0 0;}
.step-item:last-child{border-radius:0 0 14px 14px;}
.step-item:only-child{border-radius:14px;}
.step-connector{
  position:absolute;
  left:34px;
  bottom:-2px;
  width:2px;
  height:4px;
  background:var(--border);
  z-index:1;
}
.step-item:last-child .step-connector{display:none;}
.step-num{
  width:24px;
  height:24px;
  border-radius:50%;
  background:var(--bg2);
  border:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--text2);
  flex-shrink:0;
  margin-top:1px;
}
.step-body{flex:1;}
.badge{
  display:inline-flex;
  align-items:center;
  gap:4px;
  font-size:10px;
  font-weight:700;
  padding:3px 8px;
  border-radius:6px;
  margin-bottom:8px;
  letter-spacing:.5px;
}
.b-R{
  background:rgba(59,130,246,.15);
  color:var(--blue2);
  border:1px solid rgba(59,130,246,.3);
}
.b-J{
  background:rgba(240,165,0,.12);
  color:var(--amber2);
  border:1px solid rgba(240,165,0,.25);
}
.b-P{
  background:rgba(239,68,68,.12);
  color:var(--red2);
  border:1px solid rgba(239,68,68,.25);
}
.step-text{font-size:14px;line-height:1.7;color:var(--text);}

.note-box{
  background:rgba(240,165,0,.08);
  border:1px solid rgba(240,165,0,.25);
  border-radius:12px;
  padding:14px;
}
.note-label{font-size:11px;font-weight:700;color:var(--amber);margin-bottom:6px;display:flex;align-items:center;gap:4px;}
.note-text{font-size:13px;line-height:1.7;color:var(--text2);}

.det-nav{display:flex;gap:8px;margin-top:20px;}
.det-nav-btn{
  flex:1;
  padding:14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text2);
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  text-align:center;
  transition:all .15s;
  font-family:'Noto Sans JP',sans-serif;
  touch-action:manipulation;
  min-height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.det-nav-btn:active{background:var(--card2);transform:scale(.97);}
.det-check-btn{
  width:100%;
  margin-top:12px;
  padding:16px;
  border-radius:12px;
  border:none;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  transition:all .2s;
  font-family:'Noto Sans JP',sans-serif;
  min-height:52px;
  display:flex;
  align-items:center;
  justify-content:center;
  touch-action:manipulation;
}
.det-check-btn.undone{
  background:rgba(16,185,129,.12);
  color:var(--green2);
  border:1px solid rgba(16,185,129,.3);
}
.det-check-btn.done{
  background:rgba(16,185,129,.25);
  color:var(--green2);
  border:1px solid var(--green);
}

/* ─── NAV BAR ─── */
.nav-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:calc(56px + env(safe-area-inset-bottom));
  background:var(--nav-bg);
  border-top:1px solid var(--border);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  display:flex;
  z-index:200;
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
  transition:background .3s,border .3s;
}
.nav-btn{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  font-size:10px;
  color:var(--text3);
  cursor:pointer;
  transition:color .15s;
  border:none;
  background:none;
  font-family:'Noto Sans JP',sans-serif;
  padding:8px 0;
  min-height:44px;
}
.nav-btn.active{color:var(--amber);}
.nav-btn svg{transition:transform .15s;}
.nav-btn:active svg{transform:scale(.85);}

/* ─── PROGRESS CARD ─── */
.progress-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
}
.progress-title{
  font-size:12px;
  color:var(--text2);
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
}
.progress-title span{font-family:'JetBrains Mono',monospace;color:var(--amber);}
.progress-bar{
  height:8px;
  background:var(--bg2);
  border-radius:4px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  border-radius:4px;
  background:linear-gradient(90deg,var(--green),var(--green2));
  transition:width .5s;
}

/* ─── SECTION HEADER ─── */
.section-hd{
  font-size:10px;
  font-weight:700;
  color:var(--text3);
  letter-spacing:1.5px;
  text-transform:uppercase;
  padding:16px 0 8px;
}

/* ─── EMPTY STATE ─── */
.empty{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-text{font-size:14px;}

/* ─── BADGE DOTS IN LIST ─── */
.op-tags{display:flex;gap:4px;margin-left:auto;margin-right:6px;}
.op-dot{width:7px;height:7px;border-radius:50%;}
.op-dot.R{background:var(--blue);}
.op-dot.J{background:var(--amber);}
.op-dot.P{background:var(--red);}

/* scrollbar */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ─── FADE IN ─── */
@keyframes fadeIn{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:none}
}
.view.active{animation:fadeIn .2s ease-out;}

/* ─── SWIPE INDICATOR ─── */
.swipe-hint{
  position:fixed;
  bottom:calc(66px + env(safe-area-inset-bottom));
  left:50%;
  transform:translateX(-50%);
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:20px;
  padding:6px 14px;
  font-size:11px;
  color:var(--text2);
  pointer-events:none;
  opacity:0;
  transition:opacity .3s;
  z-index:150;
}
.swipe-hint.show{opacity:1;}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">REG</div>
    <div id="head-title">レジ研修ナビ</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="progress-pill" id="total-prog">0 / 0</div>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="テーマ切り替え">
      <span class="moon">🌙</span>
      <span class="sun">☀️</span>
      <span class="auto">🌓</span>
    </button>
  </div>
</div>

<div id="view-home" class="view active"></div>
<div id="view-list" class="view">
  <div class="list-header">
    <span class="list-header-icon" id="list-icon"></span>
    <span class="list-header-title" id="list-title"></span>
    <span class="list-header-count" id="list-count"></span>
  </div>
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="search-input" placeholder="No. またはキーワードで検索" enterkeyhint="search">
  </div>
  <div id="list-body"></div>
</div>
<div id="view-det" class="view">
  <div id="det-body"></div>
</div>

<div class="swipe-hint" id="swipe-hint">← スワイプで前/次へ →</div>

<nav class="nav-bar">
  <button class="nav-btn active" id="nav-home" onclick="renderHome()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>ホーム</span>
  </button>
  <button class="nav-btn" id="nav-search" onclick="showGlobalSearch()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <span>検索</span>
  </button>
  <button class="nav-btn" id="nav-back" onclick="goBack()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    <span>戻る</span>
  </button>
  <button class="nav-btn" id="nav-prog" onclick="showProgress()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span>進捗</span>
  </button>
</nav>

<script>
// ─────────────────────────────────────────
// THEME MANAGEMENT
// ─────────────────────────────────────────
function initTheme(){
  const saved = localStorage.getItem('reg_theme');
  if(saved==='dark'||saved==='light'){
    document.documentElement.setAttribute('data-theme',saved);
  }
  updateMetaTheme();
}
function toggleTheme(){
  const current = document.documentElement.getAttribute('data-theme');
  const next = current==='dark'?'light':current==='light'?null:'dark';
  if(next){
    document.documentElement.setAttribute('data-theme',next);
    localStorage.setItem('reg_theme',next);
  }else{
    document.documentElement.removeAttribute('data-theme');
    localStorage.removeItem('reg_theme');
  }
  updateMetaTheme();
}
function updateMetaTheme(){
  const isDark = !document.documentElement.getAttribute('data-theme')||
                 document.documentElement.getAttribute('data-theme')==='dark';
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const finalDark = isDark===null?prefersDark:isDark==='dark';
  document.querySelector('meta[name="theme-color"]').setAttribute('content',finalDark?'#0d1520':'#f5f7fa');
}

// ─────────────────────────────────────────
// FULL DATABASE - All 150+ items from PDF
// ─────────────────────────────────────────
const DB = [{
  id:'cat1', icon:'🟦', color:'#3b82f6', name:'基礎・開局・登録',
  sub:'No.1–24 / P.1', range:'1-24',
  items:[
    {no:1, t:'六大用語', ops:['R'], s:[{h:'R',m:'「明るく元気に、隣のレジに聞こえる声で行う」'}], n:'心得帳参照'},
    {no:2, t:'基本販売用語', ops:['R'], s:[{h:'R',m:'心得帳をよく読み、用語・言い回しを習得する'}], n:'心得帳参照'},
    {no:3, t:'売場案内', ops:['R'], s:[{h:'R',m:'PLUを使う商品の説明、相当グループ名の説明を行う'}], n:'PLU資料配布'},
    {no:4, t:'レジキー保管場所', ops:['R'], s:[{h:'R',m:'正面レジ：各フロアで1本　コーナーレジ：各レジ1本'}], n:'保管場所厳守'},
    {no:5, t:'レジ離脱ルール', ops:['R'], s:[{h:'R',m:'レジキー・カッター台・ミリオンを所定の場所に保管し、隣接レジのチェッカーに行き先を伝える'}], n:''},
    {no:6, t:'100番表', ops:['R'], s:[{h:'R',m:'消費税欄・まとめ売りの記入方法を確認する'}], n:'レシートの向きに注意'},
    {no:7, t:'ディスプレイの見方', ops:['R'], s:[{h:'R',m:'M-POS / その他レジのディスプレイレイアウトを確認する'}], n:''},

let curIdx = -1;

function saveDone(){localStorage.setItem('reg_done',JSON.stringify([...done]));}
function totalItems(){return DB.reduce((a,c)=>a+c.items.length,0);}
function updateTotalProg(){
  document.getElementById('total-prog').textContent = `${done.size} / ${totalItems()}`;
}

// ─────────────────────────────────────────
// HOME
// ─────────────────────────────────────────
function renderHome(){
  switchView('view-home');
  setNavActive('nav-home');
  document.getElementById('head-title').textContent = 'レジ研修ナビ';
  hideSwipeHint();

  const total = totalItems();
  const pct = total ? Math.round(done.size/total*100) : 0;

  let html = `
    <div class="progress-card">
      <div class="progress-title">総合進捗 <span>${done.size} / ${total} (${pct}%)</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="section-hd">カテゴリ</div>
    <div class="cat-grid">
  `;

  DB.forEach(cat=>{
    const catDone = cat.items.filter(i=>done.has(String(i.no))).length;
    const catPct = cat.items.length ? Math.round(catDone/cat.items.length*100) : 0;
    html += `
      <div class="cat-card" style="--cat-color:${cat.color}" onclick="showList('${cat.id}')">
        <div class="cat-icon">${cat.icon}</div>
        <div class="cat-name">${cat.name}</div>
        <div class="cat-sub">${cat.sub}</div>
        <div class="cat-meta">
          <span class="cat-count">${catDone}/${cat.items.length}</span>
          <span style="font-size:10px;color:var(--text3)">${catPct}%</span>
        </div>
        <div class="cat-prog-bar"><div class="cat-prog-fill" style="width:${catPct}%"></div></div>
      </div>
    `;
  });
  html += '</div>';
  document.getElementById('view-home').innerHTML = html;
  updateTotalProg();
}

// ─────────────────────────────────────────
// LIST
// ─────────────────────────────────────────
function showList(catId){
  curCat = DB.find(c=>c.id===catId);
  curCatId = catId;
  prevView = 'view-home';
  document.getElementById('list-icon').textContent = curCat.icon;
  document.getElementById('list-title').textContent = curCat.name;
  document.getElementById('search-input').value = '';
  document.getElementById('head-title').textContent = curCat.name;
  renderListItems(curCat.items);
  switchView('view-list');
  setNavActive('');
  hideSwipeHint();
}
function renderListItems(items){
  const count = items.length;
  document.getElementById('list-count').textContent = `${count}項目`;
  document.getElementById('list-body').innerHTML = items.map(item=>{
    const isDone = done.has(String(item.no));
    const tags = [...new Set(item.ops)].map(o=>`<div class="op-dot ${o}"></div>`).join('');
    return `
      <div class="item-card ${isDone?'item-done':''}" onclick="showDetail('${curCat?.id||'__search'}',${JSON.stringify(item.no)})">
        <div class="item-no">No.${item.no}</div>
        <div class="item-text">${item.t}</div>
        <div class="op-tags">${tags}</div>
        <div class="item-chk ${isDone?'done':''}"></div>
        <div class="item-arrow">▶</div>
      </div>
    `;
  }).join('') || '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">該当なし</div></div>';
}
document.addEventListener('DOMContentLoaded',()=>{
  const searchInput = document.getElementById('search-input');
  searchInput.addEventListener('input',e=>{
    const q = e.target.value.toLowerCase();
    if(!curCat) return;
    const filtered = curCat.items.filter(i=>
      i.t.toLowerCase().includes(q)||String(i.no).includes(q)||i.s.some(s=>s.m.toLowerCase().includes(q))
    );
    renderListItems(filtered);
  });
});

// ─────────────────────────────────────────
// GLOBAL SEARCH
// ─────────────────────────────────────────
function showGlobalSearch(){
  curCat = {id:'__search', name:'全体検索', items: DB.flatMap(c=>c.items)};
  curCatId = '__search';
  document.getElementById('list-icon').textContent = '🔍';
  document.getElementById('list-title').textContent = '全項目検索';
  document.getElementById('search-input').value = '';
  document.getElementById('head-title').textContent = '全体検索';
  renderListItems(curCat.items);
  switchView('view-list');
  setNavActive('nav-search');
  setTimeout(()=>document.getElementById('search-input').focus(),100);
  hideSwipeHint();
}

// ─────────────────────────────────────────
// DETAIL
// ─────────────────────────────────────────
function showDetail(catId, no){
  const cat = DB.find(c=>c.id===catId);
  const srcCat = catId==='__search' ? {items:DB.flatMap(c=>c.items)} : cat;
  const item = srcCat.items.find(i=>i.no===no);
  if(!item) return;

  curCatId = catId;
  curNo = no;
  curIdx = srcCat.items.findIndex(i=>i.no===no);
  const isDone = done.has(String(no));
  prevView = 'view-list';

  const badgeLabel = {R:'レジ操作',J:'J-Mups端末',P:'お客様/PayPay'};
  const steps = item.s.map((s,i)=>`
    <div class="step-item">
      <div class="step-num">${i+1}</div>
      <div class="step-body">
        <div class="badge b-${s.h}">${badgeLabel[s.h]||s.h}</div>
        <div class="step-text">${s.m}</div>
      </div>
      ${i<item.s.length-1?'<div class="step-connector"></div>':''}
    </div>
  `).join('');

  const noteHtml = item.n ? `
    <div class="note-box">
      <div class="note-label">💡 備考・注意</div>
      <div class="note-text">${item.n}</div>
    </div>
  ` : '';

  const prev = srcCat.items[curIdx-1];
  const next = srcCat.items[curIdx+1];

  document.getElementById('det-body').innerHTML = `
    <div class="det-header">
      <div class="det-no">No.${item.no}</div>
      <div class="det-title">${item.t}</div>
    </div>
    <div class="steps-container">${steps}</div>
    ${noteHtml}
    <button class="det-check-btn ${isDone?'done':'undone'}" onclick="toggleDone(${JSON.stringify(no)})">
      ${isDone ? '✓ 完了済み（タップで未完了に）' : '○ 完了にする'}
    </button>
    <div class="det-nav">
      ${prev?`<button class="det-nav-btn" onclick="showDetail('${catId}',${JSON.stringify(prev.no)})">◀ No.${prev.no}</button>`:'<div></div>'}
      ${next?`<button class="det-nav-btn" onclick="showDetail('${catId}',${JSON.stringify(next.no)})">No.${next.no} ▶</button>`:'<div></div>'}
    </div>
  `;
  document.getElementById('head-title').textContent = `No.${item.no} ${item.t}`;
  switchView('view-det');
  setNavActive('');

  // Show swipe hint on detail view
  if(prev||next) showSwipeHint();
  else hideSwipeHint();

  setupSwipeGestures(catId);
}

// ─────────────────────────────────────────
// SWIPE GESTURES
// ─────────────────────────────────────────
let touchStartX = 0;
let touchEndX = 0;

function setupSwipeGestures(catId){
  const view = document.getElementById('view-det');
  view.removeEventListener('touchstart', handleTouchStart);
  view.removeEventListener('touchend', handleTouchEnd);
  view.addEventListener('touchstart', handleTouchStart, {passive:true});
  view.addEventListener('touchend', handleTouchEnd, {passive:true});
}

function handleTouchStart(e){
  touchStartX = e.changedTouches[0].screenX;
}

function handleTouchEnd(e){
  touchEndX = e.changedTouches[0].screenX;
  handleSwipe();
}

function handleSwipe(){
  const swipeThreshold = 80;
  const diff = touchStartX - touchEndX;

  if(Math.abs(diff) < swipeThreshold) return;

  const cat = curCatId==='__search' ? {items:DB.flatMap(c=>c.items)} : DB.find(c=>c.id===curCatId);
  if(!cat) return;

  if(diff > 0 && curIdx < cat.items.length - 1){
    // Swipe left - next item
    const next = cat.items[curIdx+1];
    if(next) showDetail(curCatId, next.no);
  }else if(diff < 0 && curIdx > 0){
    // Swipe right - previous item
    const prev = cat.items[curIdx-1];
    if(prev) showDetail(curCatId, prev.no);
  }
}

function showSwipeHint(){
  const hint = document.getElementById('swipe-hint');
  if(hint) hint.classList.add('show');
  setTimeout(hideSwipeHint, 3000);
}

function hideSwipeHint(){
  const hint = document.getElementById('swipe-hint');
  if(hint) hint.classList.remove('show');
}

// ─────────────────────────────────────────
// PROGRESS VIEW
// ─────────────────────────────────────────
function showProgress(){
  curCat = null;
  switchView('view-home');
  setNavActive('nav-prog');
  document.getElementById('head-title').textContent = '進捗確認';
  hideSwipeHint();

  const total = totalItems();
  const pct = total ? Math.round(done.size/total*100) : 0;

  let html = `
    <div class="progress-card">
      <div class="progress-title">総合進捗 <span>${done.size} / ${total} (${pct}%)</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="section-hd">カテゴリ別進捗</div>
  `;
  DB.forEach(cat=>{
    const catDone = cat.items.filter(i=>done.has(String(i.no))).length;
    const catPct = cat.items.length ? Math.round(catDone/cat.items.length*100) : 0;
    html += `
      <div class="progress-card" style="margin-bottom:8px">
        <div class="progress-title">
          <span>${cat.icon} ${cat.name}</span>
          <span>${catDone}/${cat.items.length} (${catPct}%)</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${catPct}%;background:linear-gradient(90deg,${cat.color},${cat.color}88)"></div></div>
      </div>
    `;
  });
  if(done.size>0){
    html += `<button style="width:100%;margin-top:12px;padding:14px;border-radius:12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red2);font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans JP',sans-serif;touch-action:manipulation;min-height:48px;" onclick="if(confirm('進捗をリセットしますか？')){done.clear();saveDone();renderHome();}">進捗をリセット</button>`;
  }
  document.getElementById('view-home').innerHTML = html;
  updateTotalProg();
}

// ─────────────────────────────────────────
// TOGGLE DONE
// ─────────────────────────────────────────
function toggleDone(no){
  const key = String(no);
  if(done.has(key)) done.delete(key); else done.add(key);
  saveDone();
  updateTotalProg();
  const btn = document.querySelector('.det-check-btn');
  if(btn){
    const isDone = done.has(key);
    btn.className = `det-check-btn ${isDone?'done':'undone'}`;
    btn.textContent = isDone ? '✓ 完了済み（タップで未完了に）' : '○ 完了にする';
  }
}

// ─────────────────────────────────────────
// NAV / VIEW HELPERS
// ─────────────────────────────────────────
function switchView(id){
  ['view-home','view-list','view-det'].forEach(v=>{
    document.getElementById(v).classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function setNavActive(id){
  ['nav-home','nav-search','nav-back','nav-prog'].forEach(n=>{
    document.getElementById(n).classList.toggle('active', n===id);
  });
}
function goBack(){
  const activeId = document.querySelector('.view.active').id;
  if(activeId==='view-det'){
    if(curCatId && curCatId!=='__search') showList(curCatId);
    else renderHome();
  }else if(activeId==='view-list'){
    renderHome();
  }else{
    renderHome();
  }
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
initTheme();
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',updateMetaTheme);
renderHome();
</script>
